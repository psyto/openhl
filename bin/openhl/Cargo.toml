[package]
name         = "openhl"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
authors      = { workspace = true }

[[bin]]
name = "openhl"
path = "src/main.rs"

[dependencies]
openhl-consensus = { path = "../../crates/consensus" }
openhl-evm       = { path = "../../crates/evm" }
openhl-funding   = { path = "../../crates/funding" }
openhl-node      = { path = "../../crates/node" }
openhl-types     = { path = "../../crates/types" }

clap  = { version = "4.6", features = ["derive"] }
eyre  = { workspace = true }
tokio = { workspace = true }

# Stage 13c-f: Reth + Malachite runtime boot.
#
# Stage 13f drops the `test-utils` feature in favor of the production
# NodeBuilder path: `reth_db::init_db` for the MDBX database,
# `with_database` + `with_launch_context` for the launch surface.
reth-node-builder  = { workspace = true }
reth-node-core     = { workspace = true }
reth-node-ethereum = { workspace = true }
reth-tasks         = { workspace = true }
reth-chainspec     = { workspace = true }
reth-db            = { workspace = true }
alloy-genesis      = { workspace = true }
alloy-primitives   = { workspace = true }
serde_json         = { workspace = true }
informalsystems-malachitebft-app             = { workspace = true }
informalsystems-malachitebft-signing-ed25519 = { workspace = true, features = ["rand"] }
rand               = "0.8"
sha2               = "0.10"
tempfile           = "3"

[lints]
workspace = true
