[package]
name         = "openhl"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
authors      = { workspace = true }

[[bin]]
name = "openhl"
path = "src/main.rs"

[dependencies]
openhl-consensus = { path = "../../crates/consensus" }
openhl-evm       = { path = "../../crates/evm" }
openhl-funding   = { path = "../../crates/funding" }
openhl-node      = { path = "../../crates/node" }
openhl-types     = { path = "../../crates/types" }

clap  = { version = "4.6", features = ["derive"] }
eyre  = { workspace = true }
tokio = { workspace = true }

# Stage 13c: Reth + Malachite runtime boot.
# test-utils features expose `testing_node` for dev/devnet usage. A
# production-bootable openhl node would replace these with the
# persistent NodeBuilder path; out of scope for Stage 13c.
reth-node-builder  = { workspace = true, features = ["test-utils"] }
reth-node-core     = { workspace = true }
reth-node-ethereum = { workspace = true, features = ["test-utils"] }
reth-tasks         = { workspace = true }
reth-chainspec     = { workspace = true }
alloy-genesis      = { workspace = true }
serde_json         = { workspace = true }
informalsystems-malachitebft-app             = { workspace = true }
informalsystems-malachitebft-signing-ed25519 = { workspace = true, features = ["rand"] }
rand               = "0.8"
sha2               = "0.10"
tempfile           = "3"

[lints]
workspace = true
